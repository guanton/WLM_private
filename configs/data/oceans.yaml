# configs/data/oceans.yaml
# Ocean currents dataset configuration
#
# Data: HYCOM reanalysis, Gulf of Mexico vortex
# Structure: 9 timesteps, ~111 particles, 2D positions + velocities

mode: oceans

# Path to the NPZ file (download from curly-flow-matching repo if needed)
npz_path: datasets/oceans_with_v0.npz

num_p0: 1


# Seed for reproducibility (affects particle shuffling)
seed: 0

# Blur estimation parameters (for GeomLoss)
blur_scale: 0.5
blur_min: 0.001
blur_max: 2.0
blur_num_times: 8
blur_pairs_per_time: 1024
blur_particles_subsample: 100
